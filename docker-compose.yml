name: vamp

services:
  # MongoDB — backing store for the GraphQL API.
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # GraphQL API (Express + Apollo + type-graphql), run with ts-node-dev so it
  # restarts on source changes.
  server:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev:server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      MONGO_URI: mongodb://mongo:27017/vamp
      # Audio uploads use the local-file driver in dev (no Vercel needed).
      AUDIO_STORAGE_DRIVER: local
      PUBLIC_BASE_URL: http://localhost:4000
      AUDIO_LOCAL_DIR: /app/.audio-uploads
    volumes:
      - audio-uploads:/app/.audio-uploads
    depends_on:
      mongo:
        condition: service_healthy
    develop:
      watch:
        # Sync source into the container; ts-node-dev handles the restart.
        - action: sync
          path: ./server
          target: /app/server
          ignore:
            - node_modules/
            - dist/
        # Dependency changes require a fresh `npm ci` -> rebuild the image.
        - action: rebuild
          path: ./server/package.json
        - action: rebuild
          path: ./package-lock.json

  # Vite dev server with HMR. Runs codegen once on boot so the generated GraphQL
  # documents exist before Vite resolves imports.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm run codegen && npm run dev:app"
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # The browser (on the host) talks to the API on the published host port.
      VITE_GRAPHQL_URI: http://localhost:4000/graphql
    depends_on:
      - server
    develop:
      watch:
        # Sync source so Vite's own HMR/watcher picks up changes.
        - action: sync
          path: ./app
          target: /app/app
          ignore:
            - node_modules/
            - dist/
            - src/generated/
        # The committed schema drives codegen; pull it in on change.
        - action: sync
          path: ./server/schema.graphql
          target: /app/server/schema.graphql
        - action: rebuild
          path: ./app/package.json
        - action: rebuild
          path: ./package-lock.json

volumes:
  mongo-data:
  audio-uploads:
